.orContainer{
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;

.line{
    flex: 1;
    height: 1px;
    background-color: #d6d6d6;
}

.orContainer span{
    font-size: 13px;
    color: #888;
    font-weight: 500;
}
.SignupButtonContainer{

.SignupButtonContainer button{

    font-size: 16px;

    border: none;
    

}

gap: 6px;

}
.loginLinkContainer a{

    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
}
.loginLinkContainer a:hover{
        text-decoration: underline;

}

}
